name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  verify-tests:
    name: Verify tests passed
    runs-on: ubuntu-latest
    steps:
      - name: Wait for successful test run on this commit
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          TIMEOUT: 600
          INTERVAL: 30
        run: |
          elapsed=0
          while true; do
            SUCCESSFUL=$(gh api "repos/${REPO}/actions/workflows/test.yml/runs?head_sha=${SHA}&status=success" \
              --jq '.workflow_runs[0].id // empty')
            if [ -n "$SUCCESSFUL" ]; then
              echo "Tests passed for commit ${SHA} (run ID: ${SUCCESSFUL})"
              exit 0
            fi

            FAILED=$(gh api "repos/${REPO}/actions/workflows/test.yml/runs?head_sha=${SHA}&status=failure" \
              --jq '.workflow_runs[0].id // empty')
            if [ -n "$FAILED" ]; then
              echo "::error::Tests failed for commit ${SHA} (run ID: ${FAILED})."
              exit 1
            fi

            if [ "$elapsed" -ge "$TIMEOUT" ]; then
              echo "::error::Timed out after ${TIMEOUT}s waiting for Tests to complete for commit ${SHA}."
              echo "Push to main first and wait for tests to pass before tagging."
              exit 1
            fi

            echo "Tests still running for ${SHA}… waiting ${INTERVAL}s (${elapsed}/${TIMEOUT}s elapsed)"
            sleep "$INTERVAL"
            elapsed=$((elapsed + INTERVAL))
          done

  build-image:
    name: Build ${{ matrix.platform }}
    needs: verify-tests
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      IMAGE_NAME: ${{ vars.DOCKERHUB_NAMESPACE }}/vibeboyrunner
    steps:
      - name: Prepare platform pair
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-image:
    name: Publish Docker image
    needs: build-image
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    env:
      IMAGE_NAME: ${{ vars.DOCKERHUB_NAMESPACE }}/vibeboyrunner
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine image ref
        id: meta
        env:
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          if [[ -n "${DOCKERHUB_NAMESPACE:-}" ]]; then
            IMAGE_REF="${DOCKERHUB_NAMESPACE}/vibeboyrunner:${VERSION}"
          else
            IMAGE_REF="vibeboyrunner/vibeboyrunner:${VERSION}"
          fi
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: docker-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.ref_name }}
            type=raw,value=latest

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE_NAME }}@sha256:%s ' *)

  publish-setup:
    name: Publish setup script
    needs: publish-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: source

      - name: Render setup script and skill
        shell: bash
        env:
          IMAGE_REF: ${{ needs.publish-image.outputs.image_ref }}
          PAGES_BASE: ${{ vars.PAGES_BASE }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          PAGES_BASE="${PAGES_BASE:-https://vibeboyrunner.github.io/vibeboyrunner}"
          SETUP_URL="${PAGES_BASE}/setups/${TAG}/setup.sh"

          ENV_FILE="source/.env.example"

          # Start with template header (shebang + VBR_MODE=prod)
          cp source/setup.sh.tmpl dist/setup.sh

          # CI-derived vars (highest priority)
          printf 'VBR_VERSION="%s"\n' "${TAG#v}" >> dist/setup.sh
          printf ': "${DIND_IMAGE_REF:=%s}"\n' "$IMAGE_REF" >> dist/setup.sh
          printf ': "${VBR_RELEASE_SETUP_URL:=%s}"\n' "$SETUP_URL" >> dist/setup.sh

          # Generate env defaults from .env.example (PROD first so it wins over SHARED)
          {
            sed -n '/^# __PROD__$/,$ { /^[A-Z_][A-Z_0-9]*=/p; }' "$ENV_FILE"
            sed -n '/^# __SHARED__$/,/^# __DEV__$/ { /^[A-Z_][A-Z_0-9]*=/p; }' "$ENV_FILE"
          } | awk '{ k=$0; sub(/=.*/, "", k); if (!seen[k]++) print }' \
            | while IFS= read -r line; do
                key="${line%%=*}"
                val="${line#*=}"
                val="${val%\"}"
                val="${val#\"}"
                printf ': "${%s:=%s}"\n' "$key" "$val"
              done >> dist/setup.sh

          # Append shared body from setup.sh
          sed -n '/^# __SHARED_BODY_START__$/,/^# __SHARED_BODY_END__$/p' \
              source/setup.sh >> dist/setup.sh

          chmod +x dist/setup.sh

          # Render setup skill
          sed -e "s|__DEFAULT_SETUP_SCRIPT_URL__|${SETUP_URL}|g" \
              source/setup_skill.md.tmpl > dist/setup_skill.md

      - name: Upload setup artifacts
        uses: actions/upload-artifact@v4
        with:
          name: setup-artifacts
          path: |
            dist/setup.sh
            dist/setup_skill.md
          if-no-files-found: error

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: pages
          fetch-depth: 1
        continue-on-error: true
        id: checkout-pages

      - name: Bootstrap gh-pages branch if missing
        if: steps.checkout-pages.outcome == 'failure'
        run: |
          mkdir -p pages
          cd pages
          git init
          git checkout --orphan gh-pages
          touch .nojekyll
          git add .nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: init gh-pages branch"
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"

      - name: Publish to gh-pages
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          cd pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p "setups/${TAG}"
          cp ../dist/setup.sh "setups/${TAG}/setup.sh"
          cp ../dist/setup_skill.md "setups/${TAG}/setup_skill.md"
          git add "setups/${TAG}/"

          mkdir -p setups/latest
          cp ../dist/setup.sh setups/latest/setup.sh
          cp ../dist/setup_skill.md setups/latest/setup_skill.md
          git add setups/latest/

          cat > README.md <<'EOF'
          # VibeBoyRunner — GitHub Pages

          Published artifacts for the [VibeBoyRunner](https://github.com/vibeboyrunner/vibeboyrunner) project.

          ## Structure

          ### `setups/`

          Rendered setup scripts and agent skills, published by CI on each version tag.

          | Path | Description |
          |------|-------------|
          | `setups/<tag>/setup.sh` | Version-pinned setup script |
          | `setups/<tag>/setup_skill.md` | Agent skill for guided setup |
          | `setups/latest/` | Always matches the most recent release |
          EOF
          git add README.md

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: publish setup files for ${TAG}"
            git push origin gh-pages
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
