name: Publish DIND Image

on:
  workflow_run:
    workflows: ["Test DIND Service"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: dind-image-publish
  cancel-in-progress: false

jobs:
  docker-publish:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    env:
      IMAGE_NAME: ${{ vars.DOCKERHUB_NAMESPACE }}/vibeboyrunner
    steps:
      - name: Resolve tag ref
        id: ref
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            TAG="${{ github.event.workflow_run.head_branch }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: ${TAG}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.ref.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.ref.outputs.tag }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: Trigger setup script publish
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ref.outputs.tag }}
        run: gh workflow run setup-script-publish.yml -f tag="${TAG}"
