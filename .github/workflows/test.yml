name: Test DIND Service

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dind-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tag-check:
    name: Check for version tag
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      has_tag: ${{ steps.check.outputs.has_tag }}
    steps:
      - name: Check if commit has a v* tag
        id: check
        run: |
          TAGS=$(git ls-remote --tags "${{ github.server_url }}/${{ github.repository }}.git" "refs/tags/v*" | grep "^${{ github.sha }}" || true)
          if [[ -n "$TAGS" ]]; then
            echo "has_tag=true" >> "$GITHUB_OUTPUT"
            echo "Commit ${{ github.sha }} has a version tag — skipping standalone tests (publish workflow handles them)"
          else
            echo "has_tag=false" >> "$GITHUB_OUTPUT"
          fi

  manager-tests:
    name: Manager service tests
    needs: [tag-check]
    if: always() && (needs.tag-check.outputs.has_tag != 'true')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: manager
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: manager/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  setup-script-tests:
    name: Setup script tests
    needs: [tag-check]
    if: always() && (needs.tag-check.outputs.has_tag != 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run dev setup tests
        run: bash tests/setup/dev-setup.test.sh

      - name: Run prod setup tests
        run: bash tests/setup/prod-setup.test.sh
