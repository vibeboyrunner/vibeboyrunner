name: Publish Production Setup Script

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Render standalone setup script
        shell: bash
        env:
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
          GITHUB_OWNER_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p dist

          if [[ -z "${DOCKERHUB_NAMESPACE:-}" ]]; then
            DEFAULT_IMAGE_REF="vbr-dind:local"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            DEFAULT_IMAGE_REF="${DOCKERHUB_NAMESPACE}/vbr-dind:${VERSION}"
          else
            DEFAULT_IMAGE_REF="${DOCKERHUB_NAMESPACE}/vbr-dind:main"
          fi

          DEFAULT_SETUP_SCRIPT_URL="https://github.com/${GITHUB_OWNER_REPO}/releases/latest/download/setup.sh"

          sed -e "s|__DEFAULT_DIND_IMAGE_REF__|${DEFAULT_IMAGE_REF}|g" \
              -e "s|__DEFAULT_SETUP_SCRIPT_URL__|${DEFAULT_SETUP_SCRIPT_URL}|g" \
              setup.prod.sh.tmpl > dist/setup.sh
          chmod +x dist/setup.sh
          echo "Rendered dist/setup.sh with default image: ${DEFAULT_IMAGE_REF}"

          sed -e "s|__DEFAULT_SETUP_SCRIPT_URL__|${DEFAULT_SETUP_SCRIPT_URL}|g" \
              setup_skill.md.tmpl > dist/setup_skill.md
          echo "Rendered dist/setup_skill.md"

      - name: Upload setup artifacts
        uses: actions/upload-artifact@v4
        with:
          name: setup-artifacts
          path: |
            dist/setup.sh
            dist/setup_skill.md
          if-no-files-found: error

      - name: Publish setup script to release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/setup.sh
            dist/setup_skill.md
          generate_release_notes: true
